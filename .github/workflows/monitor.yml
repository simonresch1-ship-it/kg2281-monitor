name: KG2281 Restock Monitor

# Strategie: GitHubs Schedule ist unzuverlaessig/gedrosselt. Deshalb laeuft EIN Job
# ~5 Stunden lang und prueft intern alle 60s. Die crons sind nur stuendliche Zuend-Funken;
# dank concurrency (kein Overlap) haengt sich der naechste Job nahtlos an den vorigen an,
# sodass praktisch durchgehende ~60s-Abdeckung entsteht -- auch ohne dass GitHub haeufig zuendet.

on:
  schedule:
    - cron: "0 * * * *"     # stuendlich ein Zuendversuch (UTC); Job selbst loopt ~5h
  workflow_dispatch:
    inputs:
      test:
        description: "Test-Push senden statt echtem Check"
        type: boolean
        default: false

concurrency:
  # Test-Laeufe bekommen eine eigene Gruppe -> blockieren NICHT hinter dem laufenden 5h-Loop.
  group: ${{ (github.event_name == 'workflow_dispatch' && inputs.test) && format('kg2281-test-{0}', github.run_id) || 'kg2281-monitor' }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 310
    steps:
      - uses: actions/checkout@v4

      # --- Manueller Test: einmal Test-Push, kein Loop ---
      - name: Test-Push
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.test }}
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python3 monitor.py --test

      # --- Normalbetrieb: ~5h lang alle 60s pruefen ---
      - name: Restock-Loop (~5h, alle 60s)
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.test) }}
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          END=$((SECONDS + 18000))   # 5 Stunden
          n=0
          while [ $SECONDS -lt $END ]; do
            n=$((n+1))
            echo "--- Iteration $n (t=${SECONDS}s, $(date -u +%H:%M:%SZ)) ---"
            python3 monitor.py || true
            # State sofort persistieren, sobald sich was aendert (gegen Doppel-Ping nach Job-Ende)
            if ! git diff --quiet -- state.json; then
              git config user.name "kg2281-monitor"
              git config user.email "actions@github.com"
              git add state.json
              git commit -m "state update [skip ci]" || true
              git push || (git pull --rebase -X ours origin main && git push) || true
            fi
            sleep 60
          done
          echo "Loop fertig nach $n Iterationen."
